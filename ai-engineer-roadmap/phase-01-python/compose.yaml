services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ai_roadmap
      POSTGRES_USER: ai_roadmap
      POSTGRES_PASSWORD: ai_roadmap_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: